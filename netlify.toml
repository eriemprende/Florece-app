[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Route /api/claude to the serverless function
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

# Catch-all for React router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
